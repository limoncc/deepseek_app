name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: macos-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build macOS app (${{ matrix.artifact }})
        run: npx tauri build

      - name: Ad-hoc sign and recreate DMG
        run: |
          APP="src-tauri/target/release/bundle/macos/DeepSeek.app"
          codesign --force --deep --sign - "$APP"
          hdiutil create \
            -volname "DeepSeek" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "DeepSeek_${{ matrix.artifact }}.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: DeepSeek_${{ matrix.artifact }}.dmg
